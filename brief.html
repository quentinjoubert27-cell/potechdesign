<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Brief — Po Tech Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --text: #1a1a18;
      --muted: #8a8880;
      --border: #e2dfd8;
      --accent: #b5926a;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── PROGRESS ── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--text);
      width: 0%;
      transition: width 0.6s ease;
      z-index: 100;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      z-index: 50;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo img {
      height: 28px;
      width: auto;
    }

    .nav-logo-text {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .nav-close {
      font-family: var(--sans);
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .nav-close:hover { color: var(--text); }

    /* ── SCREEN ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 6rem 10vw 4rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .screen.exit {
      opacity: 0;
      transform: translateY(-30px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    /* ── QUESTION ── */
    .q-step {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .q-text {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--text);
      max-width: 800px;
      margin-bottom: 3rem;
    }

    .q-text em {
      font-style: italic;
      color: var(--accent);
    }

    /* ── INPUT ── */
    .q-input {
      width: 100%;
      max-width: 640px;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 0.75rem 0;
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2vw, 1.6rem);
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s;
      caret-color: var(--accent);
    }
    .q-input:focus { border-color: var(--text); }
    .q-input::placeholder { color: var(--border); }

    /* ── ACTIONS ── */
    .q-actions {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 0.9rem 2rem;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-next:hover { opacity: 0.8; }
    .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

    .hint {
      font-family: var(--sans);
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .hint kbd {
      font-family: var(--sans);
      font-size: 0.75rem;
      background: var(--border);
      padding: 0.1em 0.4em;
      border-radius: 2px;
    }

    /* ── LOADING ── */
    #screen-loading {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
    }

    .loading-label {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }
    .loading-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text);
      animation: ldot 1.2s ease infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ldot {
      0%, 60%, 100% { opacity: 0.15; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ── BRIEF FINAL ── */
    #screen-brief {
      overflow-y: auto;
      padding-top: 7rem;
      padding-bottom: 4rem;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .brief-header {
      margin-bottom: 3rem;
    }

    .brief-header .q-step { margin-bottom: 1rem; }

    .brief-header h2 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .brief-header h2 em { font-style: italic; color: var(--accent); }

    .brief-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 800px;
      border-top: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .brief-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .brief-item:nth-child(odd) { padding-right: 3rem; }
    .brief-item:nth-child(even) {
      padding-left: 3rem;
      border-left: 1px solid var(--border);
    }

    .brief-item-label {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brief-item-value {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1.5;
    }

    .brief-resume {
      max-width: 800px;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .brief-resume-label {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .brief-resume p {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--text);
    }

    .brief-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      padding: 0.9rem 2rem;
      border: 1px solid var(--border);
      font-family: var(--sans);
      font-size: 0.875rem;
      color: var(--text);
      background: none;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: var(--text); background: var(--bg); }

    @media (max-width: 640px) {
      .screen { padding: 5rem 6vw 3rem; }
      .brief-grid { grid-template-columns: 1fr; }
      .brief-item:nth-child(even) { padding-left: 0; border-left: none; }
      .brief-item:nth-child(odd) { padding-right: 0; }
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progress-bar"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/img/logo.png" alt="Po Tech Design">
      <span class="nav-logo-text">Po Tech Design</span>
    </a>
    <a href="index.html" class="nav-close">Quitter ✕</a>
  </nav>

  <!-- ÉCRAN INTRO -->
  <div class="screen active" id="screen-intro">
    <p class="q-step">Générateur de brief</p>
    <h1 class="q-text">Parlons de votre<br><em>projet.</em></h1>
    <p style="font-family:var(--sans);font-size:0.9375rem;color:var(--muted);max-width:480px;line-height:1.7;margin-bottom:2.5rem;">
      Je vais vous poser quelques questions pour construire un brief précis. Comptez 5 minutes.
    </p>
    <div class="q-actions">
      <button class="btn-next" id="btn-start">Commencer →</button>
    </div>
  </div>

  <!-- ÉCRAN QUESTION -->
  <div class="screen" id="screen-question">
    <p class="q-step" id="q-step-label">Question 1</p>
    <p class="q-text" id="q-text">…</p>
    <input class="q-input" type="text" id="q-input" placeholder="Votre réponse…" autocomplete="off">
    <div class="q-actions">
      <button class="btn-next" id="btn-send">Continuer →</button>
      <span class="hint">ou <kbd>Entrée</kbd></span>
    </div>
  </div>

  <!-- ÉCRAN CHARGEMENT -->
  <div class="screen" id="screen-loading">
    <p class="loading-label">Po Tech Design analyse votre projet…</p>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- ÉCRAN BRIEF FINAL -->
  <div class="screen" id="screen-brief">
    <div class="brief-header">
      <p class="q-step">Votre brief</p>
      <h2>Votre projet<br><em>en un coup d'œil.</em></h2>
    </div>
    <div class="brief-grid" id="brief-grid"></div>
    <div class="brief-resume" id="brief-resume"></div>
    <div class="brief-btns">
      <a href="contact.html" class="btn-next">Envoyer ce brief →</a>
      <button class="btn-outline" id="btn-copy">Copier</button>
      <button class="btn-outline" id="btn-restart">Recommencer</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://halston-api.vercel.app/api/brief';

    const screens = {
      intro: document.getElementById('screen-intro'),
      question: document.getElementById('screen-question'),
      loading: document.getElementById('screen-loading'),
      brief: document.getElementById('screen-brief'),
    };

    const progressBar = document.getElementById('progress-bar');
    const qStepLabel = document.getElementById('q-step-label');
    const qText = document.getElementById('q-text');
    const qInput = document.getElementById('q-input');
    const btnSend = document.getElementById('btn-send');
    const btnStart = document.getElementById('btn-start');

    let history = [];
    let questionCount = 0;
    const MAX_Q = 20;

    function showScreen(name) {
      Object.entries(screens).forEach(([k, el]) => {
        if (k === name) {
          el.classList.remove('exit');
          el.classList.add('active');
        } else if (el.classList.contains('active')) {
          el.classList.add('exit');
          setTimeout(() => {
            el.classList.remove('active', 'exit');
          }, 350);
        }
      });
    }

    function setProgress(n) {
      progressBar.style.width = `${Math.min(n, 100)}%`;
    }

    function parseMarkdown(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function parseBrief(text) {
      const match = text.match(/---BRIEF---([\s\S]*?)---FIN BRIEF---/);
      if (!match) return null;
      const fields = [];
      match[1].trim().split('\n').forEach(line => {
        const m = line.match(/\*\*(.+?)\s*:\*\*\s*(.+)/);
        if (m) fields.push({ label: m[1].trim(), value: m[2].trim() });
      });
      return fields;
    }

    function renderBrief(fields) {
      const grid = document.getElementById('brief-grid');
      const resume = document.getElementById('brief-resume');
      grid.innerHTML = '';
      resume.innerHTML = '';

      fields.forEach(f => {
        if (f.label === 'Résumé') {
          resume.innerHTML = `<p class="brief-resume-label">Résumé</p><p>${f.value}</p>`;
        } else {
          const div = document.createElement('div');
          div.className = 'brief-item';
          div.innerHTML = `<span class="brief-item-label">${f.label}</span><span class="brief-item-value">${f.value}</span>`;
          grid.appendChild(div);
        }
      });

      showScreen('brief');
      setProgress(100);
    }

    async function sendMessage(userText) {
      history.push({ role: 'user', content: userText });
      showScreen('loading');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        const reply = data.reply;
        history.push({ role: 'assistant', content: reply });

        const brief = parseBrief(reply);
        if (brief) {
          renderBrief(brief);
        } else {
          questionCount++;
          setProgress((questionCount / MAX_Q) * 90);
          qStepLabel.textContent = `Question ${questionCount}`;
          qText.innerHTML = parseMarkdown(reply);
          qInput.placeholder = 'Votre réponse…';
          qInput.value = '';
          showScreen('question');
          setTimeout(() => qInput.focus(), 400);
        }
      } catch (err) {
        qText.innerHTML = 'Une erreur est survenue. Veuillez réessayer.';
        showScreen('question');
      }
    }

    async function startConversation() {
      showScreen('loading');
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [{ role: 'user', content: 'Commence.' }] }),
        });
        const data = await res.json();
        history.push({ role: 'assistant', content: data.reply });

        questionCount = 1;
        setProgress(5);
        qStepLabel.textContent = 'Question 1';
        qText.innerHTML = parseMarkdown(data.reply);
        qInput.placeholder = 'Votre réponse…';
        qInput.value = '';
        showScreen('question');
        setTimeout(() => qInput.focus(), 400);
      } catch {
        showScreen('intro');
      }
    }

    function handleSend() {
      const val = qInput.value.trim();
      if (!val) return;
      sendMessage(val);
    }

    btnStart.addEventListener('click', startConversation);
    btnSend.addEventListener('click', handleSend);

    qInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); handleSend(); }
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      const items = [...document.querySelectorAll('.brief-item')].map(el => {
        const label = el.querySelector('.brief-item-label').textContent;
        const value = el.querySelector('.brief-item-value').textContent;
        return `${label} : ${value}`;
      });
      const resume = document.querySelector('#brief-resume p:last-child')?.textContent;
      if (resume) items.push(`Résumé : ${resume}`);
      navigator.clipboard.writeText(items.join('\n')).then(() => {
        const btn = document.getElementById('btn-copy');
        btn.textContent = 'Copié !';
        setTimeout(() => btn.textContent = 'Copier', 2000);
      });
    });

    document.getElementById('btn-restart').addEventListener('click', () => {
      history = [];
      questionCount = 0;
      setProgress(0);
      showScreen('intro');
    });
  </script>
</body>
</html>
